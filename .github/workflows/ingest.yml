name: Ingest RSS feeds

on:
  schedule:
    # Mon–Fri UTC: every 4h (6×/day). Weekend: every 8h (3×/day Sat–Sun).
    - cron: "0 */4 * * 1-5"
    - cron: "0 */8 * * 0,6"
  workflow_dispatch:

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --cache .npm-cache

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_RETENTION_DAYS: '30'
        run: npm run ingest
