name: Ingest RSS feeds

on:
  schedule:
    # Every 4h UTC — news (Verge, wires, Anthropic) moves faster than 2×/day
    - cron: "25 */4 * * *"
  workflow_dispatch:

concurrency:
  group: ingest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --cache .npm-cache

      - name: Run ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FEED_RETENTION_DAYS: '60'
        run: npm run ingest
